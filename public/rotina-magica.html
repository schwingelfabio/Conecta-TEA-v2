<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia & Theo - Rotina Mágica</title>
    <style>
        :root {
            --primary-blue: #a2d2ff;
            --secondary-green: #b9fbc0;
            --accent-yellow: #fffae5;
            --text-color: #2c3e50;
            --white: #ffffff;
            --progress-bg: #e0e0e0;
            --progress-fill: #4cc9f0;
            --button-hover: #90c2ef;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--accent-yellow);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        header h1 {
            color: var(--text-color);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        header p {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .characters {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .character-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-box img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-blue);
            margin-bottom: 8px;
            background: #eee;
        }

        .character-box span {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--progress-fill);
        }

        .progress-container {
            width: 100%;
            height: 25px;
            background-color: var(--progress-bg);
            border-radius: 12.5px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--progress-fill);
            transition: width 0.5s ease;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .action-btn {
            background-color: var(--primary-blue);
            border: none;
            color: white;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-btn:hover {
            background-color: var(--button-hover);
            transform: scale(1.02);
        }

        .action-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #feedback-msg {
            margin-bottom: 20px;
            font-weight: bold;
            color: #27ae60;
            min-height: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #feedback-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .success-overlay {
            opacity: 0;
            visibility: hidden;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .success-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes bounce-cheer {
            0%, 100% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-15px) scale(1.05); }
            50% { transform: translateY(0) scale(1); }
            70% { transform: translateY(-8px) scale(1.02); }
        }

        .character-img {
            transition: transform 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        .character-img.cheer {
            animation: bounce-cheer 0.8s ease-out;
        }

        .success-overlay h2 {
            font-size: 2rem;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .success-overlay p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .cta-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
        }

        .cta-section p {
            font-size: 0.9rem;
            margin-bottom: 15px;
            color: #7f8c8d;
        }

        .cta-btn {
            background-color: #ff758f;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .cta-btn:hover {
            background-color: #ff4d6d;
        }

        /* Animações de Gamificação */
        .floating-text {
            position: fixed;
            color: #ff9f1c;
            font-weight: 900;
            font-size: 2rem;
            pointer-events: none;
            animation: floatUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 200;
            text-shadow: 0 4px 0px rgba(0,0,0,0.1), 0px 4px 15px rgba(255, 159, 28, 0.5);
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-30px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
        }

        .particle {
            position: fixed;
            pointer-events: none;
            animation: popOut 0.7s ease-out forwards;
            z-index: 150;
            font-size: 1.5rem;
        }
        @keyframes popOut {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot)); opacity: 0; }
        }

        .action-btn {
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 0px #70a6d4; /* Efeito botão 3D de jogo */
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #70a6d4;
        }

        .action-btn.completed {
            background-color: #2ecc71 !important;
            transform: scale(0.98) translateY(4px) !important;
            box-shadow: 0 0px 0px #27ae60 !important;
            color: #fff;
            animation: pulse-green 0.5s;
        }
        
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        @keyframes popCheck {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            70% { transform: scale(1.5) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .check-anim {
            display: inline-block;
            animation: popCheck 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            margin-right: 5px;
        }

        .progress-bar {
            position: relative;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: translateX(-100%);
            animation: progress-shine 2s infinite;
        }
        @keyframes progress-shine {
            100% { transform: translateX(100%); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 0;
                box-shadow: none;
                background: transparent;
            }
            body {
                background-color: white;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="game-container">
        <header>
            <img src="input_file_4.png" alt="Banner Rotina Mágica" style="width: 100%; border-radius: 20px; margin-bottom: 20px;" onerror="this.style.display='none'">
            <h1>Sofia & Theo: Rotina Mágica</h1>
            <p>Descubra como pequenas rotinas ajudam no desenvolvimento do seu filho</p>
        </header>

        <div class="characters">
            <div class="character-box">
                <img id="img-sofia" class="character-img" src="input_file_0.png" alt="Sofia" onerror="this.src='https://via.placeholder.com/100?text=Sofia'">
                <span>Sofia</span>
            </div>
            <div class="character-box">
                <img id="img-theo" class="character-img" src="input_file_1.png" alt="Theo" onerror="this.src='https://via.placeholder.com/100?text=Theo'">
                <span>Theo</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span>Pontos</span>
                <span class="stat-value" id="points">0</span>
            </div>
            <div class="stat-item">
                <span>Progresso</span>
                <span class="stat-value" id="percent">0%</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div id="feedback-msg"></div>

        <div class="actions">
            <button class="action-btn" data-label="Escovar os dentes" onclick="completeTask(this, event)">
                <span>🏠</span> Escovar os dentes
            </button>
            <button class="action-btn" data-label="Ir para escola" onclick="completeTask(this, event)">
                <span>🏫</span> Ir para escola
            </button>
            <button class="action-btn" data-label="Brincar no parquinho" onclick="completeTask(this, event)">
                <span>🎠</span> Brincar no parquinho
            </button>
        </div>

        <div class="cta-section">
            <img src="input_file_3.png" alt="Conecta TEA" style="width: 80px; margin-bottom: 10px; opacity: 0.8;">
            <p>Quer receber orientação personalizada para seu filho?</p>
            <button class="cta-btn" style="padding: 18px 40px; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(255, 117, 143, 0.4);" onclick="alert('Redirecionando para Sofia IA - Especialista em TEA...'); window.top.location.href='/?tab=sofia'">Falar com Sofia IA</button>
        </div>
    </div>

    <div class="success-overlay" id="success-overlay">
        <h2>Dia completo!</h2>
        <p>Você ajudou no desenvolvimento do seu filho 💙</p>
        <button class="cta-btn" onclick="resetGame()">Jogar novamente</button>
        <div style="margin-top: 50px;">
           <p style="font-size: 0.9rem; color: #7f8c8d; margin-bottom: 10px;">Quer continuar essa jornada?</p>
           <button class="cta-btn" style="background-color: #4cc9f0;" onclick="window.location.href='/sofia-ia'">Falar com Sofia IA</button>
        </div>
    </div>

    <script>
        let points = 0;
        const totalTasks = 3;
        let feedbackTimeout;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSuccessChime() {
            try {
                initAudio();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
                oscillator.frequency.exponentialRampToValueAtTime(1174.66, audioCtx.currentTime + 0.1); // D6
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            } catch (e) { console.log('Audio not supported', e); }
        }

        function playVictoryMelody() {
             try {
                 initAudio();
                 const notes = [523.25, 659.25, 783.99, 1046.50]; // Acorde C maior
                 notes.forEach((freq, i) => {
                     setTimeout(() => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        
                        gain.gain.setValueAtTime(0, audioCtx.currentTime);
                        gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                        
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.4);
                     }, i * 120);
                 });
             } catch (e) { console.log('Audio not supported', e); }
        }

        function completeTask(btn, event) {
            if (btn.classList.contains('completed')) return;
            
            // Haptic feedback (vibração tátil mobile) - Adultos amam isso!
            if (navigator.vibrate) navigator.vibrate(50); 
            
            playSuccessChime();

            btn.classList.add('completed');
            const originalLabel = btn.getAttribute('data-label');
            btn.innerHTML = `<span class="check-anim">✅</span> ${originalLabel} <span class="check-anim" style="font-size: 0.8em; margin-left: 5px;">(Feito!)</span>`;
            
            points += 1;
            
            let rect = btn.getBoundingClientRect();
            let x = event ? event.clientX : rect.left + rect.width / 2;
            let y = event ? event.clientY : rect.top + rect.height / 2;
            
            createParticleBurst(x, y);
            showFloatingText(x, y, "+1 ⭐");
            
            triggerCheer();
            updateUI();
            
            const randomFeedbacks = ["Muito bem!", "Excelente!", "Que incrível!", "Continue assim! ✨"];
            showFeedback(randomFeedbacks[Math.floor(Math.random() * randomFeedbacks.length)]);

            if (points >= totalTasks) {
                setTimeout(() => {
                    document.getElementById('success-overlay').classList.add('active');
                    celebrationConfetti();
                }, 800);
            }
        }

        function createParticleBurst(x, y) {
            const emojis = ['✨', '⭐', '🌟', '🎉', '💙'];
            for(let i=0; i<8; i++) {
                let p = document.createElement('div');
                p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                p.className = 'particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                let tx = (Math.random() - 0.5) * 150;
                let ty = (Math.random() - 0.5) * 150;
                let rot = (Math.random() - 0.5) * 360;
                
                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);
                p.style.setProperty('--rot', `${rot}deg`);
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }
        }

        function showFloatingText(x, y, text) {
            let el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = (x - 40) + 'px';
            el.style.top = (y - 20) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function celebrationConfetti() {
            playVictoryMelody();
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
            let w = window.innerWidth;
            let h = window.innerHeight;
            for(let i=0; i<30; i++) {
               setTimeout(() => {
                   createParticleBurst(Math.random() * w, Math.random() * h);
               }, i * 60);
            }
        }

        function triggerCheer() {
            const imgSofia = document.getElementById('img-sofia');
            const imgTheo = document.getElementById('img-theo');
            
            imgSofia.classList.remove('cheer');
            imgTheo.classList.remove('cheer');
            
            setTimeout(() => {
                imgSofia.classList.add('cheer');
                imgTheo.classList.add('cheer');
            }, 10);
        }

        function updateUI() {
            document.getElementById('points').innerText = points;
            const displayProgress = Math.round((points / totalTasks) * 100);
            document.getElementById('percent').innerText = displayProgress + "%";
            document.getElementById('progress-bar').style.width = displayProgress + "%";
            document.getElementById('progress-bar').style.backgroundColor = displayProgress === 100 ? '#2ecc71' : 'var(--progress-fill)';
        }

        function showFeedback(msg) {
            const feedback = document.getElementById('feedback-msg');
            feedback.innerText = msg;
            
            feedback.classList.remove('show');
            clearTimeout(feedbackTimeout);

            setTimeout(() => {
                feedback.classList.add('show');
                feedbackTimeout = setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            }, 50);
        }

        function resetGame() {
            points = 0;
            updateUI();
            document.getElementById('progress-bar').style.backgroundColor = 'var(--progress-fill)';
            document.getElementById('success-overlay').classList.remove('active');
            
            const feedback = document.getElementById('feedback-msg');
            feedback.classList.remove('show');
            feedback.innerText = '';
            
            const buttons = document.querySelectorAll('.action-btn');
            buttons.forEach(btn => {
                btn.classList.remove('completed');
                btn.disabled = false;
                // Restaurar texto original:
                const originalLabel = btn.getAttribute('data-label');
                let icon = '🏠';
                if(originalLabel === 'Ir para escola') icon = '🏫';
                if(originalLabel === 'Brincar no parquinho') icon = '🎠';
                btn.innerHTML = `<span>${icon}</span> ${originalLabel}`;
            });
            
            const imgSofia = document.getElementById('img-sofia');
            const imgTheo = document.getElementById('img-theo');
            imgSofia.classList.remove('cheer');
            imgTheo.classList.remove('cheer');
        }
    </script>
</body>
</html>
